{% set version = "22.1.2" %}
# check https://clang.llvm.org/docs/OpenMPSupport.html
# occasionally to see last fully supported openmp ver.
{% set openmp_ver = "4.5" %}

# on osx we need to use cxx_compiler_version, rest can use package version
{% set clang_major = version.split(".")[0]|int %}
{% if cxx_compiler_version is not undefined %}
{% set clang_major = cxx_compiler_version.split(".")[0]|int %}  # [osx]
{% endif %}

package:
  name: openmp
  version: {{ version }}

source:
  url: https://github.com/llvm/llvm-project/archive/refs/tags/llvmorg-{{ version.replace(".rc", "-rc") }}.tar.gz
  sha256: a252efd7a4a268d2cc5145b17adcaa82757fdee1d06d748b4c24137807710ecb
  # name folder for easier deletion; we do the equivalent of downloading
  # the subproject sources, so the work folder then has openmp in it;
  # for details see build scripts
  folder: llvm-project
  patches:
    # fix for https://github.com/llvm/llvm-project/issues/54596
    - patches/0001-link-libomp-to-compiler-rt-on-osx-arm.patch
    - patches/0002-win-fix-link-flags.patch  # [win]
    # LLVM 22 regression: openmp/module/CMakeLists.txt:60 references
    # runtime/src directory before CMake has processed it.
    - patches/0003-fix-module-set-property-runtime-src.patch  # [win]

build:
  number: 0

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("cxx") }}
    - {{ compiler("fortran") }}  # [win]
    - clang                      # [win]
    - cmake
    - ninja
  host:
    - llvmdev {{ version }}
    # see https://github.com/llvm/llvm-project/issues/54596
    - compiler-rt {{ version }}  # [osx]
    - zstd                       # [osx and x86_64]

outputs:
  - name: llvm-openmp
    script: install_pkg.sh   # [unix]
    script: install_pkg.bat  # [win]
    build:
      # Each ignore below is justified by what libomp.{so,dylib,dll} actually
      # links against (verified via conda-build's overlinking detection):
      #   - cxx_compiler: libgcc/libstdc++ are statically linked into libomp on
      #     linux via -static-libgcc -static-libstdc++ (see build.sh `LDFLAGS`).
      #     Without this ignore, the cxx run_exports (libgcc-ng, libstdcxx-ng)
      #     would be added as run deps despite not being linked.
      #   - fortran_compiler: only present in build env on Windows. The cxx
      #     output (libomp.dll) does not consume Fortran modules — those live
      #     in the separate llvm-openmp-fortran output. flang's run_exports
      #     (libflang-rt, etc.) would be over-depending here.
      #   - llvmdev: openmp uses llvmdev only for cmake config + headers and
      #     explicitly disables LLVM_LINK_LLVM_DYLIB on linux (see build.sh
      #     sed). libomp.so does not link libLLVM.so, so llvmdev's strong
      #     run_export (libllvm<MAJOR>, ~100MB) would be wrong to inject.
      ignore_run_exports_from:
        - {{ compiler("cxx") }}
        - {{ compiler("fortran") }}
        - llvmdev
      run_exports:
        strong:
          - {{ pin_subpackage("llvm-openmp", max_pin=None) }}
          - _openmp_mutex >={{ openmp_ver }}  # [linux]
          - _openmp_mutex * *_llvm            # [linux]
    requirements:
      build:
        # cmake depends on llvm-openmp on macOS (circular dep); use ninja instead
        - cmake  # [not osx]
        - ninja  # [osx]
        # for run-exports
        - {{ stdlib("c") }}
        - {{ compiler("cxx") }}
      run_constrained:
        - openmp {{ version }}|{{ version }}.*
    test:
      requires:
        # ensure we don't pull in too-new clang (when on maintenance branch),
        # which breaks assumption about symlink below
        - clangxx <={{ version }}
        - {{ compiler('cxx') }}
      files:
        - omp_hello.c
      commands:
        # headers
        - test -f $PREFIX/include/omp.h                   # [unix]
        - if not exist %LIBRARY_INC%\omp.h exit 1         # [win]
        # clang-specific one (symlink on unix; copies on win, see install_pkg.bat)
        - test -f $PREFIX/lib/clang/{{ clang_major }}/include/omp.h         # [unix]
        {% for ver in range(18, clang_major + 1) %}
        - if not exist %LIBRARY_LIB%\clang\{{ ver }}\include\omp.h exit 1   # [win]
        {% endfor %}

        # absence of fortran bits
        - test ! -f $PREFIX/include/omp_lib.mod             # [linux]
        - test ! -f $PREFIX/include/omp_lib_kinds.mod       # [linux]
        - if exist %LIBRARY_INC%\omp_lib.mod exit 1         # [win]
        - if exist %LIBRARY_INC%\omp_lib_kinds.mod exit 1   # [win]

        # shared library
        - test -f $PREFIX/lib/libomp.so                   # [linux]
        - test -f $PREFIX/lib/libomp.dylib                # [osx]
        - if not exist %LIBRARY_BIN%\libomp.dll exit 1    # [win]
        - if not exist %LIBRARY_LIB%\libomp.lib exit 1    # [win]

        # compilation test
        - export LNK_XTRA="-Wl,--allow-shlib-undefined"   # [linux]
        - $PREFIX/bin/clang -v -fopenmp -I$PREFIX/include -L$PREFIX/lib -Wl,-rpath,$PREFIX/lib $LNK_XTRA omp_hello.c -o omp_hello  # [unix]
        - '%LIBRARY_BIN%\clang -v -fopenmp -I%LIBRARY_INC% -L%LIBRARY_LIB% omp_hello.c -o omp_hello.exe'   # [win]
        - ./omp_hello            # [unix]
        - '%cd%\omp_hello.exe'   # [win]

  - name: llvm-openmp-fortran
    script: install_pkg.sh   # [unix]
    script: install_pkg.bat  # [win]
    build:
      # restricted to windows for now
      skip: true  # [not win]
      # This output ships ONLY the Fortran module files (omp_lib.mod,
      # omp_lib_kinds.mod) — no compiled binaries — so neither the C++
      # runtime (cxx_compiler run_exports: vc14_runtime, ucrt) nor the
      # flang runtime (fortran_compiler run_exports) are needed at run
      # time. Both ignores are over-depending suppressions, not ABI
      # workarounds.
      ignore_run_exports_from:
        - {{ compiler("cxx") }}
        - {{ compiler("fortran") }}
      run_exports:
        strong:
          - {{ pin_subpackage("llvm-openmp", max_pin=None) }}
          - _openmp_mutex >={{ openmp_ver }}  # [linux]
          - _openmp_mutex * *_llvm            # [linux]
    requirements:
      build:
        - cmake
        # for run-exports
        - {{ stdlib("c") }}
        - {{ compiler("cxx") }}
        - {{ compiler("fortran") }}     # [linux]
      host:
        - {{ pin_subpackage("llvm-openmp", exact=True) }}
      run:
        - {{ pin_subpackage("llvm-openmp", exact=True) }}
      run_constrained:  # [win]
        - {{ compiler("fortran") }}  # [win]
    test:
      commands:
        - test -f $PREFIX/include/omp_lib.mod                   # [linux]
        - test -f $PREFIX/include/omp_lib_kinds.mod             # [linux]
        - if not exist %LIBRARY_INC%\omp_lib.mod exit 1         # [win]
        - if not exist %LIBRARY_INC%\omp_lib_kinds.mod exit 1   # [win]

about:
  home: https://openmp.llvm.org/
  license: Apache-2.0 WITH LLVM-exception
  license_file: openmp/LICENSE.TXT
  dev_url: https://github.com/llvm/llvm-project
  doc_url: https://llvm.org/docs/
  license_family: Apache
  summary: The OpenMP API supports multi-platform shared-memory parallel programming in C/C++ and Fortran.
  description: |
    LLVM's OpenMP runtime library (libomp) provides a high-performance implementation
    of the OpenMP API specification for shared-memory parallel programming. This
    package delivers the runtime library and headers needed to execute OpenMP programs
    compiled with clang or other LLVM-based compilers. It supports all major OpenMP
    features including parallel regions, work-sharing constructs, synchronization
    primitives, and SIMD directives. The implementation is optimized for modern
    multi-core processors and provides excellent scalability across different
    platforms including Linux, macOS, and Windows.
  dev_url: https://github.com/llvm/llvm-project/

extra:
  recipe-maintainers:
    - inducer
    - jakirkham
    - yesimon
    - isuruf
    - beckermr
    - katietz
    - h-vetinari
